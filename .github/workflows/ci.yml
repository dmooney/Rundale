name: Rundale CI

# Jobs run on GitHub-hosted `ubuntu-latest` runners.
#
# Regression coverage for Linux (Tauri native dependencies) is now active
# by default. macOS-specific builds are currently skipped in CI to save
# credits, as the core logic is cross-platform.

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: parish

env:
  CARGO_TERM_COLOR: always
  NO_PROXY: localhost,127.0.0.1,::1

permissions:
  contents: read

jobs:
  rust-quality-gate:
    name: Rust quality gate (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      # Pinned to 1.95.0 so a new stable Rust release does not silently
      # break PRs via newly-activated clippy lints. Bump deliberately in
      # a dedicated PR alongside any lint fixes the new version surfaces.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit and integration tests
        run: cargo test --workspace --all-targets

  rust-multi-channel:
    name: Rust channel matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Compile workspace
        run: cargo check --workspace --all-targets

  docs-consistency:
    name: Docs consistency (paths cited in agent docs exist on disk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check cited paths exist
        working-directory: ${{ github.workspace }}
        run: ./parish/scripts/check-doc-paths.sh

  game-harness:
    name: Full game harness fixture sweep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Run every fixture script
        shell: bash
        run: |
          set -euo pipefail
          for fixture in testing/fixtures/*.txt; do
            echo "=== Running $fixture ==="
            cargo run -p parish -- --script "$fixture" > /tmp/fixture.out
            tail -n 5 /tmp/fixture.out
          done

  ui-quality:
    name: UI quality (build, check, unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parish/apps/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: parish/apps/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Build UI
        run: npm run build

      - name: Unit tests
        run: npx vitest run

  ui-e2e:
    name: UI Playwright e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parish/apps/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: parish/apps/ui/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Install Playwright browser (Linux-only OS deps)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser (macOS)
        if: runner.os == 'macOS'
        run: npx playwright install chromium

      # Prebuild parish so Playwright's webServer starts under its 120s
      # timeout — a cold `cargo run` on this job was busting the deadline.
      - name: Prebuild parish web server binary
        working-directory: ${{ github.workspace }}/parish
        run: cargo build -p parish

      - name: Run Playwright e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: parish/apps/ui/playwright-report/
          if-no-files-found: ignore
