name: Parish CI

# Jobs run on the self-hosted [macOS, ARM64] runner `parish-mac-arm64`.
# The `if: runner.os == 'Linux'` branches are intentionally dead on
# production CI — they exist so `just act-*` (act via Linux container,
# `-P self-hosted=…` in .actrc) reproduces the workflow faithfully.
# Real Linux-regression coverage is a known gap; see docs/agent/act-local.md
# if we ever register a Linux self-hosted runner to close it.
#
# Every job also gates on `github.event_name != 'pull_request' ||
# <same-repo head>` as defense in depth: the repo is private (no public
# forks), but a compromised collaborator's fork-PR would otherwise run
# on the long-lived self-hosted runner per GitHub's hardening guidance.

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NO_PROXY: localhost,127.0.0.1,::1

permissions:
  contents: read

jobs:
  rust-quality-gate:
    name: Rust quality gate (fmt, clippy, tests)
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      # Pinned to 1.95.0 so a new stable Rust release does not silently
      # break PRs via newly-activated clippy lints. Bump deliberately in
      # a dedicated PR alongside any lint fixes the new version surfaces.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit and integration tests
        run: cargo test --workspace --all-targets

      - name: Prune stale runner artifacts
        if: always()
        run: |
          # Remove temp files left by this run (e.g., fixture output).
          rm -f /tmp/fixture.out
          # Prune cargo registry cache entries older than 30 days to keep disk healthy.
          find ~/.cargo/registry/cache -mindepth 3 -maxdepth 3 -type f \
            -mtime +30 -delete 2>/dev/null || true

  rust-multi-channel:
    name: Rust channel matrix
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Compile workspace
        run: cargo check --workspace --all-targets

      - name: Prune stale runner artifacts
        if: always()
        run: |
          find ~/.cargo/registry/cache -mindepth 3 -maxdepth 3 -type f \
            -mtime +30 -delete 2>/dev/null || true

  docs-consistency:
    name: Docs consistency (paths cited in agent docs exist on disk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check cited paths exist
        run: ./scripts/check-doc-paths.sh

  game-harness:
    name: Full game harness fixture sweep
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native deps (Tauri/WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Run every fixture script
        shell: bash
        run: |
          set -euo pipefail
          for fixture in testing/fixtures/*.txt; do
            echo "=== Running $fixture ==="
            cargo run -p parish -- --script "$fixture" > /tmp/fixture.out
            tail -n 5 /tmp/fixture.out
          done

      - name: Prune stale runner artifacts
        if: always()
        run: |
          rm -f /tmp/fixture.out
          find ~/.cargo/registry/cache -mindepth 3 -maxdepth 3 -type f \
            -mtime +30 -delete 2>/dev/null || true

  ui-quality:
    name: UI quality (build, check, unit)
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Build UI
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Prune stale runner artifacts
        if: always()
        run: |
          # Prune npm cache entries older than 30 days.
          npm cache verify 2>/dev/null || true
          find ~/.cargo/registry/cache -mindepth 3 -maxdepth 3 -type f \
            -mtime +30 -delete 2>/dev/null || true

  ui-e2e:
    name: UI Playwright e2e
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Install Playwright browser (Linux-only OS deps)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser (macOS)
        if: runner.os == 'macOS'
        run: npx playwright install chromium

      # Prebuild parish so Playwright's webServer starts under its 120s
      # timeout — a cold `cargo run` on this job was busting the deadline.
      - name: Prebuild parish web server binary
        working-directory: .
        run: cargo build -p parish

      - name: Run Playwright e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/ui/playwright-report/
          if-no-files-found: ignore

      - name: Prune stale runner artifacts
        if: always()
        run: |
          npm cache verify 2>/dev/null || true
          find ~/.cargo/registry/cache -mindepth 3 -maxdepth 3 -type f \
            -mtime +30 -delete 2>/dev/null || true
