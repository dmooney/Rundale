name: Codex Issue Auto-Fix

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-fix:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Codex to implement a fix
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt: |
            You are fixing GitHub Issue #${{ github.event.issue.number }} in ${{ github.repository }}.

            Issue title:
            ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

            Requirements:
            - Implement a minimal, correct fix for the issue.
            - Add or update tests when behavior changes.
            - Run relevant project checks and ensure they pass when possible.
            - Do not modify unrelated files.
            - Prepare the branch so a pull request can be created.

      - name: Create pull request with Codex changes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/issue-${{ github.event.issue.number }}
          delete-branch: true
          commit-message: "fix: resolve issue #${{ github.event.issue.number }}"
          title: "fix: ${{ github.event.issue.title }}"
          body: |
            Automated fix generated by Codex for issue #${{ github.event.issue.number }}.

            **Issue**
            - #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            **Source issue body**
            ${{ github.event.issue.body }}

            Fixes #${{ github.event.issue.number }}
          labels: |
            codex
            automated-pr
