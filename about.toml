# cargo-about configuration for generating THIRD_PARTY_NOTICES.rust.md.
#
# Run: `just notices` (or `cargo about generate about.hbs > THIRD_PARTY_NOTICES.rust.md`)
#
# This file declares the set of licences we accept from upstream Rust crates.
# If a new transitive dep arrives with a licence not on this list, cargo-about
# will fail the build — that's the signal to review the dep before shipping.

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# Don't include build-script-only or dev-only deps in the generated notices;
# they don't ship in the binary.
ignore-build-dependencies = false
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# Exclude first-party workspace crates (parish-*, geo-tool) from the
# generated notices — they're our own code, not third-party. cargo-about
# treats any unpublished crate (publish = false or no registry) as
# "private" when this flag is set.
[private]
ignore = true

# SQLite (bundled by rusqlite) is public-domain; its crate manifest doesn't
# declare an SPDX identifier, so clarify here.
[rusqlite]
accepted = ["MIT"]
